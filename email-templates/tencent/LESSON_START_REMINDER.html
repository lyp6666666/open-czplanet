<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程即将开始</title>
</head>
<body style="margin:0;padding:0;background-color:#f6f5ff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f6f5ff;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:640px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px;background:linear-gradient(135deg,#312e81,#2563eb);color:#ffffff;">
              <div style="font-size:24px;font-weight:700;">课程即将开始提醒</div>
              <div style="margin-top:8px;font-size:14px;line-height:22px;opacity:0.92;">请提前进入课堂，避免错过上课时间。</div>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:26px;">你好，{{receiverName}}：</p>
              <p style="margin:0 0 20px;font-size:15px;line-height:26px;">你有一节课程即将开始，请按时进入课堂。</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background-color:#eef2ff;border:1px solid #c7d2fe;border-radius:12px;">
                <tr>
                  <td style="padding:14px 16px;font-size:14px;line-height:24px;"><strong>课程名称：</strong>{{courseName}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>上课日期：</strong>{{lessonDate}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>上课时间：</strong>{{lessonTime}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>上课对象：</strong>{{counterpartName}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>课前提示：</strong>{{prepareTips}}</td>
                </tr>
              </table>
              <div style="margin-top:24px;display:inline-block;padding:12px 24px;background-color:#eff6ff;border:1px solid #bfdbfe;border-radius:999px;color:#1d4ed8;font-size:14px;font-weight:600;">请按时登录创智星球进入课堂</div>
              <p style="margin:24px 0 0;font-size:13px;line-height:22px;color:#6b7280;">如课程时间有调整，请以站内最新信息为准。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
