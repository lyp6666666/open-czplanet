<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新课后总结补发</title>
</head>
<body style="margin:0;padding:0;background-color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f8fafc;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:640px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px;background:linear-gradient(135deg,#334155,#0f766e);color:#ffffff;">
              <div style="font-size:24px;font-weight:700;">你有一份可查看的最新课后总结</div>
              <div style="margin-top:8px;font-size:14px;line-height:22px;opacity:0.92;">这是你完成邮箱绑定后补发的最近一节课程总结。</div>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:26px;">你好，{{receiverName}}：</p>
              <p style="margin:0 0 20px;font-size:15px;line-height:26px;">由于你已完成邮箱绑定，现补发最近一节可查看的课后总结。</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background-color:#f0fdfa;border:1px solid #99f6e4;border-radius:12px;">
                <tr>
                  <td style="padding:14px 16px;font-size:14px;line-height:24px;"><strong>课程名称：</strong>{{courseName}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>上课时间：</strong>{{lessonDate}} {{lessonTime}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>总结摘要：</strong>{{summaryHighlight}}</td>
                </tr>
              </table>
              <div style="margin-top:24px;display:inline-block;padding:12px 24px;background-color:#f0fdfa;border:1px solid #99f6e4;border-radius:999px;color:#0f766e;font-size:14px;font-weight:600;">请前往创智星球查看完整总结</div>
              <p style="margin:24px 0 0;font-size:13px;line-height:22px;color:#6b7280;">若你已查看过相关内容，可忽略本邮件。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
