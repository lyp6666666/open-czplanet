<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>未读消息提醒</title>
</head>
<body style="margin:0;padding:0;background-color:#f3f6f9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#111827;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f3f6f9;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:640px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px;background:linear-gradient(135deg,#065f46,#10b981);color:#ffffff;">
              <div style="font-size:24px;font-weight:700;">你有一条未读消息待查看</div>
              <div style="margin-top:8px;font-size:14px;line-height:22px;opacity:0.92;">为了避免错过重要沟通，请尽快返回站内查看。</div>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:26px;">你好，{{receiverName}}：</p>
              <p style="margin:0 0 18px;font-size:15px;line-height:26px;">你在创智星球收到一条未读消息，暂时还没有查看。</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background-color:#f9fafb;border:1px solid #e5e7eb;border-radius:12px;">
                <tr>
                  <td style="padding:14px 16px;font-size:14px;line-height:24px;"><strong>发送方：</strong>{{senderName}}（{{senderRole}}）</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>消息摘要：</strong>{{messageSummary}}</td>
                </tr>
              </table>
              <p style="margin:18px 0 16px;font-size:14px;line-height:24px;color:#6b7280;">为保护隐私，邮件中不展示完整消息内容。</p>
              <div style="display:inline-block;padding:12px 24px;background-color:#ecfdf5;border:1px solid #a7f3d0;border-radius:999px;color:#047857;font-size:14px;font-weight:600;">请前往创智星球站内查看消息</div>
              <p style="margin:24px 0 0;font-size:13px;line-height:22px;color:#6b7280;">如你已在站内查看，可忽略本邮件。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
