<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱验证码</title>
</head>
<body style="margin:0;padding:0;background-color:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f7fb;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:640px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#ffffff;">
              <div style="font-size:24px;font-weight:700;">邮箱验证通知</div>
              <div style="margin-top:8px;font-size:14px;line-height:22px;opacity:0.92;">请使用以下验证码完成邮箱绑定。</div>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:26px;">你好，</p>
              <p style="margin:0 0 16px;font-size:15px;line-height:26px;">你正在为创智星球绑定邮箱，本次验证码为：</p>
              <div style="margin:24px 0;padding:18px 20px;background-color:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;text-align:center;">
                <span style="font-size:30px;font-weight:700;letter-spacing:6px;color:#1d4ed8;">{{code}}</span>
              </div>
              <p style="margin:0 0 12px;font-size:15px;line-height:26px;">验证码 <strong>{{expireMinutes}}</strong> 分钟内有效，请尽快完成验证。</p>
              <p style="margin:0 0 12px;font-size:15px;line-height:26px;">若这不是你本人操作，请忽略本邮件，你的账号不会因此被绑定。</p>
              <p style="margin:0;font-size:13px;line-height:22px;color:#6b7280;">此邮件由系统自动发送，请勿直接回复。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
