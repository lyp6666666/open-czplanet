<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课后总结已生成</title>
</head>
<body style="margin:0;padding:0;background-color:#fff7ed;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1f2937;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#fff7ed;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="640" cellspacing="0" cellpadding="0" style="width:640px;max-width:640px;background-color:#ffffff;border-radius:16px;overflow:hidden;">
          <tr>
            <td style="padding:32px 40px;background:linear-gradient(135deg,#9a3412,#f97316);color:#ffffff;">
              <div style="font-size:24px;font-weight:700;">本节课课后总结已生成</div>
              <div style="margin-top:8px;font-size:14px;line-height:22px;opacity:0.92;">你可以查看本节课重点、作业和后续建议。</div>
            </td>
          </tr>
          <tr>
            <td style="padding:36px 40px;">
              <p style="margin:0 0 16px;font-size:15px;line-height:26px;">你好，{{receiverName}}：</p>
              <p style="margin:0 0 20px;font-size:15px;line-height:26px;">你的一节课程已结束，课后总结已经生成。</p>
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;background-color:#fffaf5;border:1px solid #fed7aa;border-radius:12px;">
                <tr>
                  <td style="padding:14px 16px;font-size:14px;line-height:24px;"><strong>课程名称：</strong>{{courseName}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>上课时间：</strong>{{lessonDate}} {{lessonTime}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>本节重点：</strong>{{summaryHighlight}}</td>
                </tr>
                <tr>
                  <td style="padding:0 16px 14px;font-size:14px;line-height:24px;"><strong>作业/建议：</strong>{{homeworkAdvice}}</td>
                </tr>
              </table>
              <p style="margin:18px 0 16px;font-size:14px;line-height:24px;color:#6b7280;">本总结内容仅供参考，请以实际课堂情况为准。</p>
              <div style="display:inline-block;padding:12px 24px;background-color:#fff7ed;border:1px solid #fdba74;border-radius:999px;color:#c2410c;font-size:14px;font-weight:600;">请前往创智星球查看完整总结</div>
              <p style="margin:24px 0 0;font-size:13px;line-height:22px;color:#6b7280;">若总结内容较长，邮件中仅展示摘要，请进入站内详情页查看完整内容。</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
