name: Deploy Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: dev-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dev code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare SSH key
        env:
          TEST_SERVER_SSH_KEY: ${{ secrets.TEST_SERVER_SSH_KEY || secrets.SERVER_SSH_KEY }}
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST || '117.72.111.39' }}
          TEST_SERVER_PORT: ${{ secrets.TEST_SERVER_PORT || '22' }}
        run: |
          test -n "$TEST_SERVER_SSH_KEY"
          test -n "$TEST_SERVER_HOST"
          mkdir -p ~/.ssh
          printf '%s\n' "$TEST_SERVER_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$TEST_SERVER_PORT" "$TEST_SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare test server bare repo
        env:
          TEST_SERVER_USER: ${{ secrets.TEST_SERVER_USER || 'root' }}
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST || '117.72.111.39' }}
          TEST_SERVER_PORT: ${{ secrets.TEST_SERVER_PORT || '22' }}
          TEST_SERVER_GIT_DIR: ${{ secrets.TEST_SERVER_GIT_DIR || '/opt/ai-platform.git' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "$TEST_SERVER_PORT" \
            -o StrictHostKeyChecking=yes \
            "$TEST_SERVER_USER@$TEST_SERVER_HOST" \
            "if [ ! -d '$TEST_SERVER_GIT_DIR' ]; then git init --bare '$TEST_SERVER_GIT_DIR'; fi"

      - name: Push dev code to test server
        env:
          TEST_SERVER_USER: ${{ secrets.TEST_SERVER_USER || 'root' }}
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST || '117.72.111.39' }}
          TEST_SERVER_PORT: ${{ secrets.TEST_SERVER_PORT || '22' }}
          TEST_SERVER_GIT_DIR: ${{ secrets.TEST_SERVER_GIT_DIR || '/opt/ai-platform.git' }}
        run: |
          git remote remove test-server-deploy 2>/dev/null || true
          git remote add test-server-deploy "ssh://$TEST_SERVER_USER@$TEST_SERVER_HOST:$TEST_SERVER_PORT$TEST_SERVER_GIT_DIR"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -p $TEST_SERVER_PORT -o StrictHostKeyChecking=yes -o ServerAliveInterval=15 -o ServerAliveCountMax=4" \
            git push --force test-server-deploy "HEAD:refs/heads/dev"

      - name: Deploy on test server
        env:
          TEST_SERVER_USER: ${{ secrets.TEST_SERVER_USER || 'root' }}
          TEST_SERVER_HOST: ${{ secrets.TEST_SERVER_HOST || '117.72.111.39' }}
          TEST_SERVER_PORT: ${{ secrets.TEST_SERVER_PORT || '22' }}
          TEST_SERVER_GIT_DIR: ${{ secrets.TEST_SERVER_GIT_DIR || '/opt/ai-platform.git' }}
          TEST_SERVER_PATH: ${{ secrets.TEST_SERVER_PATH || '/opt/ai-platform' }}
          TEST_MANAGE_INFRA: ${{ vars.TEST_MANAGE_INFRA || 'auto' }}
          TEST_INFRA_CONTAINERS: ${{ vars.TEST_INFRA_CONTAINERS || 'mysql redis rabbitmq minio minio_init livekit' }}
          TEST_NACOS_GRPC_CHECK: ${{ vars.TEST_NACOS_GRPC_CHECK || 'warn' }}
          TEST_NACOS_SERVER_ADDR: ${{ vars.TEST_NACOS_SERVER_ADDR || '127.0.0.1:18848' }}
          TEST_NACOS_TUNNEL_HOST: ${{ vars.TEST_NACOS_TUNNEL_HOST || '111.228.20.88' }}
          TEST_AUTO_VERIFY_DB_SCHEMA: ${{ vars.TEST_AUTO_VERIFY_DB_SCHEMA || '0' }}
          TEST_FRONTEND_HOST: ${{ vars.TEST_FRONTEND_HOST || '0.0.0.0' }}
          TEST_LIVEKIT_WS_URL: ${{ vars.TEST_LIVEKIT_WS_URL }}
          TEST_ADMIN_WEB_BASE_PATH: ${{ vars.TEST_ADMIN_WEB_BASE_PATH || '/admin/' }}
          TEST_ENABLE_AI_AGENT: ${{ vars.TEST_ENABLE_AI_AGENT || '1' }}
          TEST_AI_AGENT_HOST: ${{ vars.TEST_AI_AGENT_HOST || '127.0.0.1' }}
          TEST_GATEWAY_PORT: ${{ vars.TEST_GATEWAY_PORT || '18080' }}
          TEST_AI_AGENT_PORT: ${{ vars.TEST_AI_AGENT_PORT || '18086' }}
        run: |
          if [ -z "$TEST_LIVEKIT_WS_URL" ]; then
            TEST_LIVEKIT_WS_URL="ws://$TEST_SERVER_HOST/livekit"
          fi

          ssh -i ~/.ssh/id_ed25519 -p "$TEST_SERVER_PORT" \
            -o StrictHostKeyChecking=yes \
            "$TEST_SERVER_USER@$TEST_SERVER_HOST" \
            "DEPLOY_PATH='$TEST_SERVER_PATH' \
             MANAGE_INFRA='$TEST_MANAGE_INFRA' \
             INFRA_CONTAINERS='$TEST_INFRA_CONTAINERS' \
             NACOS_GRPC_CHECK='$TEST_NACOS_GRPC_CHECK' \
             NACOS_SERVER_ADDR='$TEST_NACOS_SERVER_ADDR' \
             TEST_NACOS_TUNNEL_HOST='$TEST_NACOS_TUNNEL_HOST' \
             AUTO_VERIFY_DB_SCHEMA='$TEST_AUTO_VERIFY_DB_SCHEMA' \
             FRONTEND_HOST='$TEST_FRONTEND_HOST' \
             LIVEKIT_WS_URL='$TEST_LIVEKIT_WS_URL' \
             ADMIN_WEB_BASE_PATH='$TEST_ADMIN_WEB_BASE_PATH' \
             ENABLE_AI_AGENT='$TEST_ENABLE_AI_AGENT' \
             AI_AGENT_HOST='$TEST_AI_AGENT_HOST' \
             GATEWAY_PORT='$TEST_GATEWAY_PORT' \
             AI_AGENT_PORT='$TEST_AI_AGENT_PORT' \
             /usr/local/bin/ai-platform-dev-deploy.sh '$TEST_SERVER_GIT_DIR' '${GITHUB_SHA}'"
