# 支付服务配置（DEV）
# DataId: payment-service-dev.yaml
# Group: DEFAULT_GROUP
#
# 注意：
# - 支付相关密钥/证书/回调地址均为敏感配置，建议只存在 Nacos（不要提交 Git）
# - 若你们希望把支付域统一收敛，可使用 ai-tutor-payment-dev.yaml（本仓库已 import）

security:
  gateway-identity:
    enabled: true

payment:
  # 是否启用真实支付能力（DEV 常用 mock）
  enabled: true
  # 支付成功事件补偿重试间隔（毫秒）
  eventRetryDelayMs: 60000

  alipay:
    appId: "<TODO:ALIPAY_APP_ID>"
    privateKey: "<TODO:ALIPAY_PRIVATE_KEY>"
    alipayPublicKey: "<TODO:ALIPAY_PUBLIC_KEY>"
    notifyUrl: "<TODO:ALIPAY_NOTIFY_URL>"
    gatewayUrl: "https://openapi.alipay.com/gateway.do"

  wechat:
    appId: "<TODO:WX_PAY_APPID>"
    miniappId: "<TODO:WX_MINI_APPID>"
    mchId: "<TODO:WX_PAY_MCHID>"
    apiV3Key: "<TODO:WX_PAY_API_V3_KEY>"
    privateKeyPath: "<TODO:WX_PAY_PRIVATE_KEY_PATH>"
    certificateSerialNo: "<TODO:WX_PAY_CERT_SERIAL_NO>"
    notifyUrl: "<TODO:WX_PAY_NOTIFY_URL>"
    # 是否启用支付 mock（DEV 可 true；PROD 必须 false）
    mock-enabled: false

  yungouos:
    appId: "<TODO:PAYMENT_YUNGOUOS_APP_ID>"
    appKey: "<TODO:PAYMENT_YUNGOUOS_APP_KEY>"
    base-url: "https://api.pay.yungouos.com"
    wechat-mch-id: "<TODO:PAYMENT_YUNGOUOS_WECHAT_MCH_ID>"
    alipay-mch-id: "<TODO:PAYMENT_YUNGOUOS_ALIPAY_MCH_ID>"
    notify-url: "<TODO:PAYMENT_YUNGOUOS_NOTIFY_URL>"
    return-url: "<TODO:PAYMENT_YUNGOUOS_RETURN_URL>"
    native-pay-type: 2

integration:
  brokerage:
    remote:
      enabled: true

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: payment-service

