# 短信配置（DEV）
# DataId: ai-tutor-sms-dev.yaml
# Group: DEFAULT_GROUP
#
# 说明：
# - 当前短信实现支持阿里云短信认证服务（Dypnsapi）和旧 Spug Push 通道
# - AccessKey/Secret 为敏感信息，必须只存 Nacos（不要提交 Git）

sms:
  # 是否启用真实发送
  # - true：真正调用 provider 指定的短信通道
  # - false：只写入 Redis/本地缓存，方便联调（生产不建议使用 false，除非明确知道后果）
  realSendEnabled: true
  # 短信通道：aliyun 或 spug
  # - aliyun：SendSmsVerifyCode 发送，CheckSmsVerifyCode 校验
  # - spug：本地生成验证码并调用旧 Spug Push 发送，本地校验
  provider: "aliyun"

  aliyun:
    # 阿里云 RAM AccessKey（敏感）
    accessKeyId: "<TODO:ALIYUN_ACCESS_KEY_ID>"
    # 阿里云 RAM AccessKeySecret（敏感）
    accessKeySecret: "<TODO:ALIYUN_ACCESS_KEY_SECRET>"
    # 短信认证服务 endpoint，一般无需修改
    endpoint: "dypnsapi.aliyuncs.com"
    # 区域，一般保持 cn-hangzhou
    regionId: "cn-hangzhou"
    # 阿里云短信签名
    signName: "<TODO:SMS_SIGN_NAME>"
    # 短信认证模板 Code；登录/注册模板当前为 100001
    templateCode: "100001"
    # 短信认证方案名；如果阿里云控制台没有配置方案名，可留空字符串
    schemeName: ""
    # 中国大陆手机号国家码
    countryCode: "86"
    # 验证码长度，需和模板/业务预期一致
    codeLength: 4
    # 验证码有效期，秒
    validTimeSeconds: 300
    # 同一手机号发送间隔，秒；接口层还有 1 分钟限频
    intervalSeconds: 60
    # 重复发送策略，按阿里云短信认证服务配置使用
    duplicatePolicy: 1
    # 生产建议 false；true 时阿里云响应会返回验证码，仅用于受控联调
    returnVerifyCode: false
    # 必须包含 "##code##"；min 需匹配模板中的 ${min} 和 validTimeSeconds=300
    templateParam: '{"code":"##code##","min":"5"}'

  spug:
    # Spug Push 基础地址（一般无需修改）
    baseUrl: "https://push.spug.cc"
    # 推送 token（敏感）；provider=spug 时必填
    token: "<TODO:SMS_SPUG_TOKEN>"
    # 发送方名称（展示在推送内容里）
    senderName: "推送助手"
