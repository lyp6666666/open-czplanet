# IM 服务配置（PROD）
# DataId: videoCall-IM-service-prod.yaml
# Group: DEFAULT_GROUP

security:
  gateway-identity:
    enabled: true

integration:
  appointment:
    remote:
      # 生产建议保持 true，避免本服务绕过预约服务的远程能力。
      enabled: true

brokerage:
  # 旧默认金额 / 兜底金额（分）。
  # 只有在“统一信息费开关”关闭，且动态计算因为缺少价格/频次等必要字段而无法得出结果时，才会回退到这里。
  # 生产不建议配置成 1（0.01 元），否则异常回退时会产生明显失真的订单金额。
  amount-fen: 19900

  info-fee:
    unified:
      # 新统一信息费开关。
      # true：所有新创建的信息费订单都强制使用 amount-fen，不再走按频次阶梯的一周课时费规则。
      # false：走当前业务规则动态计算信息费。
      enabled: false
      # 统一信息费金额（分），仅在 enabled=true 时生效。
      # 如果配成 1，就会把所有新信息费订单统一压成 0.01 元。
      amount-fen: 19900

  # 管理端 token（敏感，建议只在 Nacos 配）
  admin-token: "<TODO:BROKERAGE_ADMIN_TOKEN>"

tutor-application:
  # 生产禁止跳过支付校验。
  skip-payment-check: false

rocketmq:
  # RocketMQ NameServer，替换为生产环境实际值。
  name-server: 127.0.0.1:9876

# 邮件配置已统一迁移到 ai-tutor-email-prod.yaml。
# 请不要在本服务 DataId 中重复配置 email.*，避免覆盖统一邮件配置。
