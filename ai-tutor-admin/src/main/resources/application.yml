spring:
  application:
    name: ai-tutor-admin
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:ai-tutor-common.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:ai-tutor-common-${spring.profiles.active}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:111.228.20.88:8848}
        group: DEFAULT_GROUP
        namespace: ${NACOS_CONFIG_NAMESPACE:${NACOS_NAMESPACE:beacf12a-2e06-43ae-80f1-6579081850a1}}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:111.228.20.88:8848}
        namespace: ${NACOS_DISCOVERY_NAMESPACE:${NACOS_NAMESPACE:beacf12a-2e06-43ae-80f1-6579081850a1}}

security:
  gateway-identity:
    enabled: true
