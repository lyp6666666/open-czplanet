spring:
  application:
    name: ai-tutor-gateway

gateway:
  jwt:
    issuer: ai-tutor
    secrets:
      - ${GATEWAY_JWT_SECRET:}
  sign:
    secret: ${GATEWAY_SIGN_SECRET:}
    clock-skew-ms: 60000
    whitelist-paths:
      - /user/loginOrRegister
      - /user/sendcode
      - /api/v1/public/**
      - /payment/notify/**
