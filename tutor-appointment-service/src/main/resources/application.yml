storage:
  minio:
    enabled: true
    endpoint: http://127.0.0.1:9000
    accessKey: minioadmin
    secretKey: minioadmin
    bucket: ai-tutor-assets
    publicBaseUrl: http://127.0.0.1:9000/ai-tutor-assets
    autoCreateBucket: true
    allowedAvatarUrlPrefixes:
      - http://127.0.0.1:9000/ai-tutor-assets
  upload:
    maxSizeBytes: 20971520
    avatarMaxSizeBytes: 5242880
    allowedContentTypes:
      - image/jpeg
      - image/png
      - image/webp
      - image/gif
      - image/svg+xml

sms:
  spug:
    baseUrl: https://push.spug.cc
    token: j1xw4otxS5qNVWugRVLAhA
    senderName: 推送助手
