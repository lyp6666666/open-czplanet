spring:
  application:
    name: live-class-service
  profiles:
    active: dev
  cloud:
    nacos:
      username: ${NACOS_USERNAME:}
      password: ${NACOS_PASSWORD:}
      config:
        server-addr: ${NACOS_SERVER_ADDR:111.228.20.88:8848}
        group: DEFAULT_GROUP
        namespace: ${NACOS_CONFIG_NAMESPACE:${NACOS_NAMESPACE:481e4376-4576-4b18-ac19-f61e170ca3ae}}
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:111.228.20.88:8848}
        namespace: ${NACOS_DISCOVERY_NAMESPACE:${NACOS_NAMESPACE:481e4376-4576-4b18-ac19-f61e170ca3ae}}
  config:
    import:
      - optional:nacos:ai-tutor-common.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:ai-tutor-common-${spring.profiles.active}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yaml?group=DEFAULT_GROUP&refreshEnabled=true

livekit:
  api-key: ${LIVEKIT_API_KEY:dev-api-key}
  api-secret: ${LIVEKIT_API_SECRET:CHANGE_ME_LIVEKIT_API_SECRET}
  ws-url: ${LIVEKIT_WS_URL:ws://127.0.0.1:7880}
  room-prefix: ${LIVEKIT_ROOM_PREFIX:class}
  token-ttl-seconds: ${LIVEKIT_TOKEN_TTL_SECONDS:7200}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
