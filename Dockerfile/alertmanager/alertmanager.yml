global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: default-webhook
    webhook_configs:
      - url: http://host.docker.internal:19090/alertmanager/webhook
        send_resolved: true
