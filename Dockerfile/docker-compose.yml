services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Aa123456
      MYSQL_DATABASE: ai_tutor
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-time-zone=+08:00"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ../sqlDoc/huoyue.sql:/docker-entrypoint-initdb.d/01-huoyue.sql:ro
      - ../sqlDoc/seed_dev_data.sql:/docker-entrypoint-initdb.d/02-seed_dev_data.sql:ro

  redis:
    image: docker.m.daocloud.io/library/redis:7.4
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    volumes:
      - ./redis-data:/data

  rabbitmq:
    image: docker.m.daocloud.io/library/rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

  minio_init:
    image: quay.io/minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -lc "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/ai-tutor-assets || true &&
      mc anonymous set download local/ai-tutor-assets || true
      "
    restart: "no"

  prometheus:
    image: docker.m.daocloud.io/prom/prometheus:v2.54.1
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  grafana:
    image: docker.m.daocloud.io/grafana/grafana-oss:11.2.0
    container_name: grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: huoyue
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana-data:/var/lib/grafana
