services:
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.4
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: Aa123456
      MYSQL_DATABASE: ai_tutor
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - "--character-set-server=utf8mb4"
      - "--collation-server=utf8mb4_unicode_ci"
      - "--default-time-zone=+08:00"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ../sqlDoc/huoyue.sql:/docker-entrypoint-initdb.d/01-huoyue.sql:ro
      - ../sqlDoc/seed_dev_data.sql:/docker-entrypoint-initdb.d/02-seed_dev_data.sql:ro

  redis:
    image: docker.m.daocloud.io/library/redis:7.4
    container_name: redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "123456"]
    volumes:
      - ./redis-data:/data

  rabbitmq:
    image: docker.m.daocloud.io/library/rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data

  minio_init:
    image: quay.io/minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -lc "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/ai-tutor-assets || true &&
      mc anonymous set download local/ai-tutor-assets || true
      "
    restart: "no"

  prometheus:
    image: docker.m.daocloud.io/prom/prometheus:v2.54.1
    container_name: prometheus
    depends_on:
      - alertmanager
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - ./prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.external-url=/ops/prometheus/"
      - "--web.route-prefix=/"

  alertmanager:
    image: docker.m.daocloud.io/prom/alertmanager:v0.27.0
    container_name: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"

  grafana:
    image: docker.m.daocloud.io/grafana/grafana-oss:11.2.0
    container_name: grafana
    depends_on:
      - prometheus
      - loki
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: huoyue
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/ops/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: "https://huoyue.online"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana-data:/var/lib/grafana

  loki:
    image: docker.m.daocloud.io/grafana/loki:3.1.1
    container_name: loki
    ports:
      - "3100:3100"
    command:
      - "-config.file=/etc/loki/local-config.yaml"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./loki-data:/loki

  promtail:
    image: docker.m.daocloud.io/grafana/promtail:3.1.1
    container_name: promtail
    depends_on:
      - loki
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  node-exporter:
    image: docker.m.daocloud.io/prom/node-exporter:v1.8.2
    container_name: node-exporter
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    ports:
      - "8081:8080"
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro

  mysqld-exporter:
    image: docker.m.daocloud.io/prom/mysqld-exporter:v0.16.0
    container_name: mysqld-exporter
    depends_on:
      - mysql
    ports:
      - "9104:9104"
    environment:
      DATA_SOURCE_NAME: root:Aa123456@(mysql:3306)/

  redis-exporter:
    image: docker.m.daocloud.io/oliver006/redis_exporter:v1.62.0
    container_name: redis-exporter
    depends_on:
      - redis
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: "123456"

  rabbitmq-exporter:
    image: docker.m.daocloud.io/kbudde/rabbitmq-exporter:v1.0.0-RC19
    container_name: rabbitmq-exporter
    depends_on:
      - rabbitmq
    ports:
      - "9419:9419"
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: guest
      RABBIT_PASSWORD: guest

  livekit:
    image: docker.m.daocloud.io/livekit/livekit-server:v1.9.12
    container_name: livekit
    networks:
      default:
      docker_default:
    depends_on:
      - redis
    command: --config /etc/livekit/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50100:50000-50100/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit/livekit.yaml:ro

networks:
  docker_default:
    external: true
