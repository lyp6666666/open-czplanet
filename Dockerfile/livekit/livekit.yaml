port: 7880

redis:
  address: redis:6379
  password: "123456"

rtc:
  port_range_start: 50000
  port_range_end: 50100
  tcp_port: 7881
  # 公网/跨设备访问时，LiveKit 必须向浏览器宣告外部可达的 ICE 候选地址。
  # 这里启用外网 IP 探测，并避免把 127.0.0.1 这类仅本机可达地址广播给客户端。
  use_external_ip: true

keys:
  dev-api-key: CHANGE_ME_LIVEKIT_API_SECRET

room:
  auto_create: true
  empty_timeout: 600
  departure_timeout: 20

webhook:
  api_key: dev-api-key
  urls:
    - http://host.docker.internal:18085/internal/live/webhooks/livekit
